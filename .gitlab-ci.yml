                  "DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS": "0",
                  "DJANGO_SECURE_HSTS_PRELOAD": "0",
              },
              [],
          ),
          (
              "shared-dev secure baseline",
              True,
              {
                  "DMIS_RUNTIME_ENV": "shared-dev",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "shared-dev.dmis.example.org",
              },
              [],
          ),
          (
              "staging secure baseline",
              True,
              {
                  "DMIS_RUNTIME_ENV": "staging",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "staging.dmis.example.org",
              },
              [],
          ),
          (
              "production secure baseline",
              True,
              {
                  "DMIS_RUNTIME_ENV": "production",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "dmis.example.org",
              },
              [],
          ),
          (
              "shared-dev rejects loopback-only hosts",
              False,
              {
                  "DMIS_RUNTIME_ENV": "shared-dev",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "localhost,127.0.0.1",
              },
              [],
          ),
          (
              "shared-dev rejects disabled https redirect",
              False,
              {
                  "DMIS_RUNTIME_ENV": "shared-dev",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "shared-dev.dmis.example.org",
                  "DJANGO_SECURE_SSL_REDIRECT": "0",
              },
              [],
          ),
          (
              "staging rejects weak hsts",
              False,
              {
                  "DMIS_RUNTIME_ENV": "staging",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "staging.dmis.example.org",
                  "DJANGO_SECURE_HSTS_SECONDS": "3600",
              },
              [],
          ),
          (
              "production rejects placeholder secret",
              False,
              {
                  "DMIS_RUNTIME_ENV": "production",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "dmis.example.org",
                  "DJANGO_SECRET_KEY": "replace-with-a-long-random-secret",
              },
              [],
          ),
          (
              "production rejects insecure csrf trusted origins",
              False,
              {
                  "DMIS_RUNTIME_ENV": "production",
                  "DJANGO_DEBUG": "0",
                  "DJANGO_ALLOWED_HOSTS": "dmis.example.org",
                  "DJANGO_CSRF_TRUSTED_ORIGINS": "http://dmis.example.org",
              },
              [],
          ),
      ]

      for name, expect_success, updates, removals in cases:
          env = {**base_env, **common_env, **updates}
          for key in removals:
              env.pop(key, None)
          result = subprocess.run(
              [sys.executable, "manage.py", "shell", "-c", "import dmis_api.settings"],
              cwd=backend_cwd,
              env=env,
              capture_output=True,
              text=True,
          )
          succeeded = result.returncode == 0
          if succeeded != expect_success:
              print(f"[FAIL] {name}")
              print("stdout:")
              print(result.stdout)
              print("stderr:")
              print(result.stderr)
              raise SystemExit(1)
          verdict = "passed" if expect_success else "failed as expected"
          print(f"[OK] {name}: {verdict}")
      PY

