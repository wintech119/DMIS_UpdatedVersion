<a class="skip-to-main" href="#main-content">Skip to main content</a>
<div class="app-layout">
  <app-sidenav
    [currentUser]="currentUser()"
    [userRole]="userRole()"
    [userRoles]="userRoles()">
  </app-sidenav>

  <div class="app-main">
    <header class="app-topbar">
      <div class="topbar-breadcrumb">
        <span class="breadcrumb-segment breadcrumb-root">DMIS</span>
        @for (crumb of breadcrumbs(); track crumb.label; let last = $last) {
          <span class="breadcrumb-sep">/</span>
          @if (crumb.route && !last) {
            <a class="breadcrumb-segment breadcrumb-link" [routerLink]="crumb.route">{{ crumb.label }}</a>
          } @else {
            <span class="breadcrumb-segment" [class.breadcrumb-current]="last">{{ crumb.label }}</span>
          }
        }
      </div>
      <div class="topbar-actions">
        @if (canSwitchLocalHarnessUser()) {
          <label for="dev-user-select" class="dev-user-label">Local test mode</label>
          <select
            id="dev-user-select"
            class="dev-user-select"
            [value]="selectedLocalHarnessUser()"
            (change)="switchLocalHarnessUser($any($event.target).value)">
            <option value="">{{ localHarnessDefaultLabel() }}</option>
            @for (user of localHarnessUsers(); track user.username) {
              <option [value]="user.username">
                {{ formatLocalHarnessUserLabel(user) }}
              </option>
            }
          </select>
          <button
            type="button"
            class="dev-user-clear"
            [disabled]="!selectedLocalHarnessUser()"
            (click)="clearLocalHarnessUser()">
            Reset
          </button>
        }
      </div>
    </header>

    <dmis-data-freshness-banner></dmis-data-freshness-banner>

    <main id="main-content" class="app-shell">
      <router-outlet />
    </main>
  </div>
</div>
