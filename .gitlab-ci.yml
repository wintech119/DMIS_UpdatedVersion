#----- DAST SCAN
dast_api:
  stage: dast
  script:
    - echo 'dast running'
  artifacts:
    reports:
      dast: gl-dast-api-report.json
stages:
  - build  # no build stage. Maybe we could build the JS
  - test
  - upload
  - pre_deploy
  - deploy
  - dast

default:
  tags: 
    - docker
  image: python:3.12-slim

# -- do not run pipeline on a new branch ---
workflow:
  rules:
      - if: $CI_PIPELINE_SOURCE == 'push' && $CI_COMMIT_BEFORE_SHA != "0000000000000000000000000000000000000000"
        when: always
      - when: never 

# -- include in jobs run on protected branches
.release_cond:
  only:
    - develop
    - staging
    - /^release-.*$/

# -- use this when we run artify - upload+deploy jobs
.artify_opts:
  image: zonaldev/artify:1.10.9

# -- derive release metadata and patch manifest.yml for the neutral bundle ---
.prepare_release_manifest:
  before_script:
    - export DMIS_RELEASE_VERSION="${DMIS_RELEASE_VERSION:-${CI_COMMIT_TAG:-${CI_PIPELINE_IID:-$CI_COMMIT_SHORT_SHA}}}"
    - export RELEASE_ARTIFACT="$(basename dist/*.tar.gz | tail -1)"
    - sed -i "s/{APP_VERSION}/${DMIS_RELEASE_VERSION}/g; s/{PACKAGE_FILENAME}/${RELEASE_ARTIFACT}/g" manifest.yml

build-live-stack-bundle:
  stage: build
  image: node:22-bookworm
  script:
    - export DMIS_RELEASE_VERSION="${DMIS_RELEASE_VERSION:-${CI_COMMIT_TAG:-${CI_PIPELINE_IID:-$CI_COMMIT_SHORT_SHA}}}"
    - export LIVE_STACK_ARTIFACT_BASENAME="goj_dmis_live_stack"
    - export LIVE_STACK_ARTIFACT_NAME="${LIVE_STACK_ARTIFACT_BASENAME}_${DMIS_RELEASE_VERSION}.tar.gz"
    - export LIVE_STACK_BUNDLE_DIR="dist/release/goj-dmis-live-stack-${DMIS_RELEASE_VERSION}"
    - echo "Building Angular + Django live-stack bundle ${LIVE_STACK_ARTIFACT_NAME}"
    - rm -rf dist/release
    - test -d dist && rm -f dist/*.tar.gz
    - cd frontend
    - npm ci
    - npm run build -- --configuration production
    - cd ..
    - mkdir -p "${LIVE_STACK_BUNDLE_DIR}/docs/deploy"
    - cp README.md DEPLOYMENT.md manifest.yml "${LIVE_STACK_BUNDLE_DIR}/"
    - cp docs/deploy/nginx.conf.example "${LIVE_STACK_BUNDLE_DIR}/docs/deploy/nginx.conf.example"
    - cp -R backend "${LIVE_STACK_BUNDLE_DIR}/backend"
    - cp -R frontend/dist/dmis-frontend/browser "${LIVE_STACK_BUNDLE_DIR}/browser"
    - sed -i "s/{APP_VERSION}/${DMIS_RELEASE_VERSION}/g; s/{PACKAGE_FILENAME}/${LIVE_STACK_ARTIFACT_NAME}/g" "${LIVE_STACK_BUNDLE_DIR}/manifest.yml"
    - tar -C dist/release -czf "dist/${LIVE_STACK_ARTIFACT_NAME}" "$(basename "${LIVE_STACK_BUNDLE_DIR}")"
  artifacts:
    paths:
      - dist/*.tar.gz
    untracked: false
    when: on_success
    access: all
    expire_in: 2 hour

verify-live-stack-bundle:
  stage: test
  dependencies:
    - build-live-stack-bundle
  script:
    - export DMIS_RELEASE_VERSION="${DMIS_RELEASE_VERSION:-${CI_COMMIT_TAG:-${CI_PIPELINE_IID:-$CI_COMMIT_SHORT_SHA}}}"
    - export RELEASE_ARTIFACT="$(basename dist/*.tar.gz | tail -1)"
    - rm -rf dist/verify
    - mkdir -p dist/verify
    - tar -C dist/verify -xzf "dist/${RELEASE_ARTIFACT}"
    - export RELEASE_DIR="$(find dist/verify -mindepth 1 -maxdepth 1 -type d | head -1)"
    - test -n "${RELEASE_DIR}"
    - test -d "${RELEASE_DIR}/backend"
    - test -d "${RELEASE_DIR}/browser"
    - test -f "${RELEASE_DIR}/browser/index.html"
    - test ! -e "${RELEASE_DIR}/app"
    - test ! -e "${RELEASE_DIR}/pyproject.toml"
    - test ! -e "${RELEASE_DIR}/requirements.txt"
    - grep -q "version: ${DMIS_RELEASE_VERSION}" "${RELEASE_DIR}/manifest.yml"
    - ! sed '/verify-live-stack-bundle:/,$d' .gitlab-ci.yml | grep -q "app.__version__"
    - ! grep -q 'attr = "app.__version__"' pyproject.toml

publish-package:
  stage: upload
  dependencies:
    - build-live-stack-bundle
  extends:
    - .artify_opts
    - .release_cond
    - .prepare_release_manifest
  script:
    - export ARTIFACT_NAME="$(basename dist/*.tar.gz | tail -1)"
    - |-
      if [[ $CI_COMMIT_BRANCH =~ ^release-.*$ ]]; then
        NEX_REPO="releases";
      elif [ "$CI_COMMIT_BRANCH" == "staging" ]; then
        NEX_REPO="staging";
      else
        NEX_REPO="snapshots";
      fi
    - mv dist/$ARTIFACT_NAME .
    - >
      python3 -m artify -c nexus -r egov-$NEX_REPO -f maven -n $ARTIFACT_NAME
      -w ./ -h https://bizdevnex.egovja.com
    - mv $ARTIFACT_NAME dist/

replenishment-export-audit-migration:
  stage: pre_deploy
  resource_group: replenishment-export-audit-migration
  extends:
    - .release_cond
  script:
    - python -m pip install -r backend/requirements.txt
    - cd backend
    - python manage.py apply_replenishment_sql_migration 20260414_dmis08_export_audit_request_id.sql --apply 2>&1 | tee migration_20260414_dmis08_export_audit_request_id.log
  artifacts:
    when: always
    paths:
      - backend/migration_20260414_dmis08_export_audit_request_id.log

awx-deploy:
  stage: deploy
  dependencies:
    - build-live-stack-bundle
  extends:
    - .artify_opts
    - .release_cond
    - .prepare_release_manifest
  script:
    - echo "Calling the ansible web-hook to deploy"
    - echo "Sending Deployment Data to ${DEPLOY_HOOK_URL_:'no_url_found'}"
    # - >
    #   wget --header "Content-Type: application/json"
    #   --post-data '{"version":"'${APP_VERSION_}'", "branch":"'${CI_COMMIT_REF_NAME}'", "deploy_as":"backend", "name":"'${CI_PROJECT_NAME}'"}'
    #   -O - "$DEPLOY_HOOK_URL_"
